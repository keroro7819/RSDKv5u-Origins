name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build RSDKv5U (x64)
      run: msbuild RSDKv5U.sln /p:Configuration=Release /p:Platform=x64 /p:AdditionalOptions="/permissive-"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RSDKv5U-Windows-x64
        path: x64/Release/
